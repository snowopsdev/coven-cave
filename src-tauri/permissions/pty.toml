[[permission]]
identifier = "allow-pty-start"
description = "Allows starting a PTY session."
commands.allow = ["pty_start"]

[[permission]]
identifier = "allow-pty-write"
description = "Allows writing bytes to a PTY session."
commands.allow = ["pty_write"]

[[permission]]
identifier = "allow-pty-resize"
description = "Allows resizing a PTY session."
commands.allow = ["pty_resize"]

[[permission]]
identifier = "allow-pty-stop"
description = "Allows stopping a PTY session."
commands.allow = ["pty_stop"]

[[permission]]
identifier = "allow-pty-list"
description = "Allows listing active PTY sessions."
commands.allow = ["pty_list"]

[[permission]]
identifier = "allow-pty-diagnose"
description = "Allows running a one-shot PTY diagnostic."
commands.allow = ["pty_diagnose"]

[[permission]]
identifier = "allow-browser-navigate"
description = "Allows navigating an embedded browser webview."
commands.allow = ["browser_navigate"]

[[permission]]
identifier = "allow-browser-set-bounds"
description = "Allows positioning an embedded browser webview."
commands.allow = ["browser_set_bounds"]

[[permission]]
identifier = "allow-browser-hide"
description = "Allows hiding an embedded browser webview."
commands.allow = ["browser_hide"]

[[permission]]
identifier = "allow-browser-hide-all-except"
description = "Allows hiding all embedded browser webviews except one."
commands.allow = ["browser_hide_all_except"]

[[permission]]
identifier = "allow-browser-close"
description = "Allows closing an embedded browser webview."
commands.allow = ["browser_close"]

[[permission]]
identifier = "allow-browser-close-all"
description = "Allows closing every embedded browser webview for a pane during surface teardown."
commands.allow = ["browser_close_all"]

[[permission]]
identifier = "allow-browser-reload"
description = "Allows reloading an embedded browser webview."
commands.allow = ["browser_reload"]

[[permission]]
identifier = "allow-shell-open"
description = "Allows opening a URL in the system browser."
commands.allow = ["shell_open"]

[[permission]]
identifier = "allow-browser-report-title"
description = "Allows child browser webviews to report their document title via Rust."
commands.allow = ["browser_report_title"]

[[permission]]
identifier = "allow-browser-report-scroll"
description = "Allows child browser webviews to report scroll position via Rust."
commands.allow = ["browser_report_scroll"]
