name: Release

# Builds all three Cave artifacts and uploads them to the GitHub Release
# matching the pushed tag:
#
#   - macOS (DMG) — signed with the Soul Protocol LLC Developer ID and
#     notarized via the App Store Connect API. The workflow refuses to
#     upload an un-notarized DMG: a verification step runs `spctl` after
#     the build and fails the job if Gatekeeper does not accept it.
#   - Linux (AppImage) — unsigned.
#   - Windows (MSI) — unsigned (users see SmartScreen on first run; we'll
#     wire WINDOWS_CERTIFICATE secrets when we buy a code-signing cert).
#
# Trigger: push a tag matching `v*` (e.g. `git tag -s v0.0.16 && git push
# origin v0.0.16`).
#
# Required repository secrets for the macOS job:
#   APPLE_CERTIFICATE          base64-encoded .p12 export of the Developer
#                              ID Application certificate.
#   APPLE_CERTIFICATE_PASSWORD password set when exporting the .p12.
#   APPLE_SIGNING_IDENTITY     the identity codesign should use, e.g.
#                              "Developer ID Application: Soul Protocol LLC
#                              (9LR8Z8UQ9X)" or the SHA1 hash. The local
#                              release.sh uses the SHA1 because there are
#                              two identities sharing the display name.
#   APPLE_API_ISSUER           the App Store Connect API issuer UUID.
#   APPLE_API_KEY              the API key id (e.g. 3822D8Z5XFI0).
#   APPLE_API_KEY_BASE64       base64-encoded contents of the AuthKey_*.p8
#                              private key.
#   APPLE_ID                   Apple Developer account email. Used as the
#                              preferred notarytool auth path because current
#                              GitHub macOS runners crash in API-key JWT
#                              generation.
#   APPLE_PASSWORD             app-specific password for APPLE_ID.
#   APPLE_TEAM_ID              Developer Team ID.
#
# The macOS leg intentionally uses scripts/release.sh instead of tauri-action
# because it assembles + notarizes the DMG in a more reliable way for this
# repository. Linux and Windows still ship via tauri-action on the tag-push.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach builds to (e.g. v0.0.16). Must already exist on origin."
        required: true
        type: string
      platform:
        description: "Platform to build when manually re-running a release."
        required: false
        default: all
        type: choice
        options:
          - all
          - macos
          - linux
          - windows

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            label: macOS Intel (DMG, signed + notarized)
            args: "--bundles dmg"
            arch_suffix: x86_64
          - platform: macos-15
            label: macOS Apple Silicon (DMG, signed + notarized)
            args: "--bundles dmg"
            arch_suffix: aarch64
          - platform: ubuntu-22.04
            label: Linux (AppImage)
            args: "--bundles appimage"
            arch_suffix: ""
          - platform: windows-latest
            label: Windows (MSI)
            args: "--bundles msi"
            arch_suffix: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set release metadata
        shell: bash
        env:
          RAW_RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="$RAW_RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag. Expected format: vMAJOR.MINOR.PATCH[-PRERELEASE]"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: >-
          matrix.platform == 'ubuntu-22.04' &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27

      - name: Rust cache
        uses: swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: "src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # Decode the App Store Connect API key onto the runner for the custom
      # macOS release script. The path is exported into the env for later
      # steps. Runs only on the macOS leg.
      - name: Stage Apple API key
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | decode_base64 > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Import Apple signing certificate
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/apple_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_TIMEOUT_HOURS=6
          KEYCHAIN_TIMEOUT_SECONDS=$((KEYCHAIN_TIMEOUT_HOURS * 60 * 60))
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::Failed to generate a temporary keychain password"
            exit 1
          fi
          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }
          printf '%s' "$APPLE_CERTIFICATE" | decode_base64 > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Keep the keychain unlocked for up to 6 hours so long notarization
          # waits do not relock it before codesign finishes.
          security set-keychain-settings -lut "$KEYCHAIN_TIMEOUT_SECONDS" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build with tauri-action
        if: >-
          (
            matrix.platform == 'ubuntu-22.04' &&
            (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux')
          ) ||
          (
            matrix.platform == 'windows-latest' &&
            (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows')
          )
        uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "CovenCave ${{ env.RELEASE_TAG }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Build macOS DMG with custom release script
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        shell: bash
        env:
          # Xcode 16.3's notarytool crashes with exit 132 on the current
          # macos-15 Intel runner image. Use the image's default 16.4
          # toolchain explicitly so notarization stays on the macOS 15 SDK.
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          bash scripts/release.sh "$RELEASE_VERSION"

      # Disambiguate the produced DMG by host arch so the Intel and Apple
      # Silicon legs upload distinct artifacts. v0.0.53 shipped an x86_64-only
      # node sidecar that crashed under Rosetta on M-series Macs; running both
      # legs gives users a native binary per arch.
      - name: Suffix macOS DMG with arch
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          SRC="release/CovenCave-v${RELEASE_VERSION}.dmg"
          DST="release/CovenCave-v${RELEASE_VERSION}-${{ matrix.arch_suffix }}.dmg"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected $SRC from release.sh but it was not produced"
            ls -la release/ || true
            exit 1
          fi
          mv "$SRC" "$DST"
          echo "Renamed to $DST"

      # Hard gate: fail the macOS leg if the produced DMG is not accepted
      # by Gatekeeper as a notarized Developer ID app. This is what makes
      # "require notarization" a build-time invariant rather than a
      # convention. Without this, a misconfigured secret would silently
      # ship an unsigned DMG, which is exactly what regressed
      # v0.0.13–v0.0.15.
      - name: Verify macOS DMG is notarized
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find release -name "CovenCave*.dmg" -type f | head -n1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG produced by the macOS release build"
            exit 1
          fi
          echo "Verifying $DMG"
          if ! spctl -a -t open --context context:primary-signature -vv "$DMG" 2>&1 | tee /tmp/spctl.out | grep -q "accepted"; then
            echo "::error::DMG is not accepted by Gatekeeper. Output:"
            cat /tmp/spctl.out
            exit 1
          fi
          if ! grep -q "Notarized Developer ID" /tmp/spctl.out; then
            echo "::error::DMG is signed but NOT notarized. Output:"
            cat /tmp/spctl.out
            exit 1
          fi
          echo "OK: $(grep 'origin=' /tmp/spctl.out)"

      - name: Upload macOS DMG to GitHub Release
        if: >-
          startsWith(matrix.platform, 'macos-') &&
          (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/CovenCave-v${{ env.RELEASE_VERSION }}-${{ matrix.arch_suffix }}.dmg

  checksums:
    name: Publish SHA256SUMS
    needs: build
    runs-on: ubuntu-22.04
    if: success()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        shell: bash
        env:
          RAW_RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="$RAW_RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag. Expected format: vMAJOR.MINOR.PATCH[-PRERELEASE]"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      # Pull the artifacts that the build matrix just uploaded to the
      # GitHub release and produce a single SHA256SUMS asset alongside
      # them. README's "Release standard" promises "SHA256 checksums for
      # all artifacts" — this job is what makes that automatic instead
      # of operator-memory.
      - name: Download release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _release
          gh release download "$RELEASE_TAG" \
            --dir _release \
            --pattern 'CovenCave-*.dmg' \
            --pattern 'CovenCave-*.AppImage' \
            --pattern 'CovenCave_*.AppImage' \
            --pattern 'CovenCave-*.msi' \
            --pattern 'CovenCave_*.msi'
          ls -la _release

      - name: Compute SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd _release
          # shasum's default two-space format matches `shasum -a 256 -c`
          # so users can verify with:
          #   shasum -a 256 -c SHA256SUMS
          shasum -a 256 CovenCave* | sort > SHA256SUMS
          echo "SHA256SUMS contents:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: _release/SHA256SUMS
