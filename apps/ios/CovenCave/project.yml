name: CovenCave
options:
  bundleIdPrefix: ai.opencoven
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "9LR8Z8UQ9X"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
targets:
  CovenCave:
    type: application
    platform: iOS
    sources:
      - path: CovenCave
    preBuildScripts:
      - name: Generate web bundles (markdown.html + terminal.html)
        # markdown.html / terminal.html are gitignored, build-generated bundles
        # the WebViews load. A build that ships without them renders assistant
        # replies as blank slivers (markdown) / a dead terminal. Regenerate them
        # on every build so a fresh checkout is never missing them. Non-fatal:
        # if node can't be found we warn and rely on the Swift Text fallback.
        basedOnDependencyAnalysis: false
        script: |
          set -u
          REPO="$SRCROOT/../../.."
          if ! command -v node >/dev/null 2>&1; then
            for p in /opt/homebrew/bin /usr/local/bin "$HOME/.volta/bin" "$HOME/.nvm/versions/node"/*/bin; do
              [ -x "$p/node" ] && export PATH="$p:$PATH" && break
            done
          fi
          if ! command -v node >/dev/null 2>&1; then
            echo "warning: node not found — skipping web bundle generation (using fallbacks)"
            exit 0
          fi
          ( cd "$REPO" && node scripts/build-ios-markdown.mjs && node scripts/build-ios-terminal.mjs ) \
            || echo "warning: web bundle generation failed — using fallbacks"
    settings:
      base:
        INFOPLIST_FILE: CovenCave/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencoven.cave
        PRODUCT_NAME: CovenCave
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_ENTITLEMENTS: CovenCave/CovenCave.entitlements
    dependencies:
      - target: CovenCaveWidgets

  # Unit tests for the pure pairing logic (CaveInvite parsing, token-expiry
  # extraction). CI doesn't build Swift, so these run locally:
  #   xcodebuild test -project CovenCave.xcodeproj -scheme CovenCave \
  #     -destination 'platform=iOS Simulator,name=<sim>'
  CovenCaveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CovenCaveTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencoven.cave.tests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: CovenCave

  # UI tests that drive the app on a simulator — e.g. the Diary's ink flow
  # (draw → recognize → reply), which host-side synthetic input can't reach
  # without macOS Accessibility grants. Run:
  #   xcodebuild test -project CovenCave.xcodeproj -scheme CovenCave \
  #     -destination 'platform=iOS Simulator,name=<sim>' \
  #     -only-testing:CovenCaveUITests
  CovenCaveUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CovenCaveUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencoven.cave.uitests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: CovenCave

  # Widget extension hosting the "task running" Live Activity (Lock Screen +
  # Dynamic Island) and the home-screen "Up Next" widget. Shares
  # TaskActivityAttributes.swift + WidgetSnapshot.swift with the app target;
  # the App Group lets the widget read the snapshot the app publishes.
  CovenCaveWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CovenCaveWidgets
      - path: CovenCave/LiveActivity/TaskActivityAttributes.swift
      - path: CovenCave/LiveActivity/WidgetSnapshot.swift
      - path: CovenCave/Intents/WidgetReminderIntents.swift
    settings:
      base:
        INFOPLIST_FILE: CovenCaveWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencoven.cave.widgets
        PRODUCT_NAME: CovenCaveWidgets
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: CovenCaveWidgets/CovenCaveWidgets.entitlements

schemes:
  CovenCave:
    build:
      targets:
        CovenCave: all
    test:
      targets:
        - CovenCaveTests
        - CovenCaveUITests
    run:
      config: Debug
